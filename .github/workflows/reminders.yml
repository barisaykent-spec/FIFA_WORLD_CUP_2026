name: Maç hatırlatma bildirimleri

on:
  schedule:
    - cron: "*/30 * * * *"   # her 30 dakikada bir
  workflow_dispatch:          # elle de tetiklenebilir
    inputs:
      test:
        description: "Test bildirimi gönder (tüm jetonlara)"
        type: boolean
        default: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bağımlılıkları kur
        working-directory: notifier
        run: npm install

      - name: Hatırlatmaları gönder
        working-directory: notifier
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TEST_NOTIFY: ${{ inputs.test && '1' || '' }}
        run: node send-reminders.js
